services:
  webgcs03:
    build:
      context: .
    image: webgcs03:latest
    ports:
      - "8080:80"
    environment:
      API_BASE_URL: "http://host.docker.internal:8080/api"
      APP_NAME: "WebGCS03 Docker"
      MAPBOX_ACCESS_TOKEN: ""
      MAPBOX_STYLE_URL: "mapbox://styles/mapbox/satellite-streets-v12"
